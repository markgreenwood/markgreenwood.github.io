<!DOCTYPE html>
<head>
	<title>Velo Portal</title>
	<link type="text/css" href="css/site-template.css" rel="stylesheet" />
</head>
<body>
	<div id="page">
		<header>
			<h1>Velo Portal</h1>
			<nav>
				<ul>
					<li class="navitem"><a href="index.html">Home</a></li>
					<li class="navitem"><a href="#news">News</a></li>
					<li class="navitem"><a href="#races">Races</a></li>
					<li class="navitem"><a href="#market">Marketplace</a></li>
					<li class="navitem"><a href="about.html">About</a></li>
				</ul>
			</nav>
		</header>
		<div class="content">
			<section class="feature" id="news">
			</section>
			<section class="secondary-content">
				<!-- <article class="column1" id="news">
					<iframe src="http://www.google.com/uds/modules/elements/newsshow/iframe.html?topic=e,p,s,n&rsz=small"
	        frameborder="0" width="300" height="250" marginwidth="0" marginheight="0"></iframe>
				</article> -->
				<div class="column2" id="races">
					<div id="race-table">
					</div>
					<div id="customize-races">
						<form>
							<label for="racer-name">Name: </label><input type="text" id="racer-name" name="racer-name" /><br />
							<label for="state">State: </label>
							<select name="state">
								<option></option>
								<option>CA</option>
								<option>OR</option>
								<option>WA</option>
							</select><br />
							<label for="racetype">Race type: </label>
							<select id="racetype" name="racetype">
								<option></option>
								<option>Road Race</option>
								<option>Stage Race</option>
								<option>Time Trial</option>
								<option>Triathlon</option>
								<option>Criterium</option>
							</select><br />
							<button id="customize-search-btn">Customize (save search)</button>
						</form>
					</div>
				</div>
				<div class="column3" id="market">
					<form>
					</form>
					<div id="mkt-items">
					</div>
					<div id="add-item">
						<form>
							<label for="buysell">Buy/sell:</label>
							<select id="buysell" name="buysell">
								<option>Buy</option>
								<option>Sell</option>
							</select><br />
							<label for="item">Item: </label>
							<input type="text" id="item" name="item" /><br />
							<label for="description">Description: </label>
							<input type="textarea" id="description" name="description" /><br />
							<label for="price">Price (USD): </label>
							<input type="text" id="price" name="price" /><br />
							<label for="contact-name">Contact name: </label>
							<input type="text" id="contact-name" name="contact-name" /><br />
							<label for="contact-phone">Contact phone: </label>
							<input type="text" id="contact-phone" name="contact-phone" /><br />
							<button id="additembutton">Add item</button>
						</form>
					</div>
				</div>
			</section>
		</div> <!-- content -->
		<footer>&copy;Copyright 2016 by <a href="mailto:mrkjgreenwood@gmail.com">Mark Greenwood</a></footer>
	</div> <!-- page -->
	<script type="text/javascript" src="js/news.js"></script>
	<script type="text/javascript" src="js/races.js"></script>
	<script type="text/javascript" src="js/marketplace.js"></script>
</body>
</html>
